# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'


tasks:
  install:
    desc: Install dependencies
    cmds:
      - venv/bin/pip install -r requirements.txt

  run:
    desc: Start the Flask app
    cmds:
      - venv/bin/python app.py

  test:
    desc: Run Pytest tests
    cmds:
      - venv/bin/pytest tests/ -v
    
  lint:
    desc: Run Ruff linting
    cmds:  
      - venv/bin/ruff check app.py tests/

  cluster-up:
    desc:  Recreate Kind cluster and apply all manifests
    cmds:
      - kind delete cluster --name devops-site || true
      - kind create cluster --name devops-site --config=kind-config.yml
      - bash scripts/setup-cluster.sh
